# Evaluation configuration for the privacy-preserving video pipeline evaluation framework.
# All paths are relative to the repository root unless absolute.

output_dir: results/eval

datasets:
  - name: chokepoint
    path: data/chokepoint
    ground_truth_path: data/chokepoint/ground_truth.json
    sequences: []
    split: all

  - name: mot20
    path: assets/MOT20
    ground_truth_path: data/mot20/ground_truth.json
    sequences:
      - MOT20-01
      - MOT20-02
      - MOT20-03
      - MOT20-05
    split: train

recognition_eligibility:
  face_score_min: 0.5
  face_size_min_px: 1200
  max_pose_angle: 45.0
  max_occlusion_ratio: 0.5

anonymization:
  method: pixelate
  pixelation_divisor: 10
  blur_kernel: 31

attack_recognizer:
  model: buffalo_l
  providers:
    - CPUExecutionProvider
  recognition_threshold: 0.6
  gallery_split_ratio: 0.7

latency_budget_ms: 50.0

baselines:
  - name: pixelate_full
    config_path: configs/dual_example.yaml
    description: Full pipeline with pixelate anonymization
  - name: blur_full
    config_path: configs/dual_blur.yaml
    description: Full pipeline with blur anonymization
