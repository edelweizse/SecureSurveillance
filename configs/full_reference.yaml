# VeilSight full reference config.
# This file is loadable as-is and uses the preferred stage-aligned config names.
#
# model_instances means the number of model objects and worker threads created
# in a shared stage pool. ncnn_threads means internal NCNN backend threads used
# by each model object. Approximate CPU pressure for an NCNN stage is:
# model_instances * ncnn_threads, plus per-stream coordinator, ingestor, and
# encoder threads.
#
# Unknown people remain anonymized with the noop identity decider. This is the
# current fail-closed behavior.
#
# Legacy detector and recognizer-owned face detector alias paths are
# intentionally unsupported in the breaking-clean stage layout.

server:
  host: "0.0.0.0"
  port: 8080

controller:
  host: "0.0.0.0"
  port: 8000

runner:
  id: "edge-0"
  grpc:
    listen: "unix:///tmp/veilsight-runner.sock"
    fallback_tcp: "127.0.0.1:9090"
  public_base_url: "http://localhost:8080"

streaming:
  primary: "webrtc"
  fallback: "mjpeg"
  codec: "h264"
  encoder: "auto"
  bitrate_kbps: 6000
  keyframe_interval_frames: 30
  webrtc:
    enabled: true
    max_peers_per_stream: 2
    ice_gathering_timeout_ms: 2000
    session_idle_timeout_s: 30
    stun_servers:
      - "stun:stun.l.google.com:19302"
    cors_allowed_origins:
      - "http://localhost:8000"
      - "http://127.0.0.1:8000"
      - "http://localhost:5173"
      - "http://127.0.0.1:5173"

runtime:
  reorder_window: 5
  pending_state_limit: 500
  jpeg_quality: 75

  # Runtime queue names:
  # - global/person_detector.in -> queues.global.person_detector_in_capacity
  # - stream/<id>/frames.in -> queues.per_stream.frames_in_capacity
  # - stream/<id>/person_detections.in -> queues.per_stream.person_detections_in_capacity
  # - global/face_detector.in -> queues.global.face_detector_in_capacity
  # - stream/<id>/faces.in -> queues.per_stream.faces_in_capacity
  # - global/recognizer.in -> queues.global.recognizer_in_capacity
  # - stream/<id>/recognitions.in -> queues.per_stream.recognitions_in_capacity
  # - global/identity.in -> queues.global.identity_in_capacity
  # - stream/<id>/identities.in -> queues.per_stream.identities_in_capacity
  # - global/anonymizer.in -> queues.global.anonymizer_in_capacity
  # - stream/<id>/encoder.in -> queues.per_stream.encoder_in_capacity
  queues:
    global:
      person_detector_in_capacity: 50
      face_detector_in_capacity: 50
      recognizer_in_capacity: 50
      identity_in_capacity: 50
      anonymizer_in_capacity: 50
    per_stream:
      frames_in_capacity: 5
      person_detections_in_capacity: 20
      faces_in_capacity: 20
      recognitions_in_capacity: 20
      identities_in_capacity: 20
      encoder_in_capacity: 5

  anonymizer:
    model_instances: 1
    method: "pixelate"
    pixelation_divisor: 10
    blur_kernel: 31

modules:
  person_detector:
    type: "yolox"
    model_instances: 2
    yolox:
      variant: "nano"
      model_path: "models/detector/bytetrack_nano"
      param_path: "models/detector/bytetrack_nano.ncnn.param"
      bin_path: "models/detector/bytetrack_nano.ncnn.bin"
      input_w: 1088
      input_h: 608
      score_threshold: 0.35
      nms_threshold: 0.45
      top_k: 300
      class_id: 0
      ncnn_threads: 1
      letterbox: true
      decoded_output: false

    # YOLOX tiny alternative for a larger person detector.
    # type: "yolox"
    # model_instances: 1
    # yolox:
    #   variant: "tiny"
    #   model_path: "models/detector/bytetrack_tiny"
    #   param_path: "models/detector/bytetrack_tiny.ncnn.param"
    #   bin_path: "models/detector/bytetrack_tiny.ncnn.bin"
    #   input_w: 1088
    #   input_h: 608
    #   score_threshold: 0.35
    #   nms_threshold: 0.45
    #   top_k: 300
    #   class_id: 0
    #   ncnn_threads: 1
    #   letterbox: true
    #   decoded_output: false

    # SCRFD is a compatible detector backend, but it is face-oriented and is
    # not recommended as the full-body person detector for anonymization.
    # SCRFD variants include: 500m, 25g, 10g, 500m_landmarks, 25g_landmarks.
    # type: "scrfd"
    # model_instances: 1
    # scrfd:
    #   variant: "500m"
    #   param_path: "models/detector/scrfd_500m/scrfd_500m.ncnn.param"
    #   bin_path: "models/detector/scrfd_500m/scrfd_500m.ncnn.bin"
    #   input_w: 640
    #   input_h: 640
    #   score_threshold: 0.35
    #   nms_threshold: 0.30
    #   top_k: 750
    #   ncnn_threads: 1

    # YuNet is also a compatible detector backend, but it is face-oriented.
    # type: "yunet"
    # model_instances: 1
    # yunet:
    #   param_path: "models/detector/yunet/face_detection_yunet_2023mar.ncnn.param"
    #   bin_path: "models/detector/yunet/face_detection_yunet_2023mar.ncnn.bin"
    #   input_w: 1088
    #   input_h: 608
    #   score_threshold: 0.60
    #   nms_threshold: 0.30
    #   top_k: 750
    #   ncnn_threads: 1

  tracker:
    type: "bytetrack"

    # Complete demo tracker block.
    # type: "demo"
    # demo:
    #   high_thresh: 0.60
    #   low_thresh: 0.20
    #   match_iou_thresh: 0.30
    #   low_match_iou_thresh: 0.20
    #   min_hits: 2
    #   max_missed: 20

    bytetrack:
      high_thresh: 0.45
      low_thresh: 0.20
      new_track_thresh: 0.45
      match_iou_thresh: 0.35
      low_match_iou_thresh: 0.25
      unconfirmed_match_iou_thresh: 0.35
      duplicate_iou_thresh: 0.85
      track_buffer: 100
      min_box_area: 0.0
      fuse_score: true
      scene_grid:
        enabled: true
        rows: 6
        cols: 8
        association_weight: 0.15
        cell_distance_weight: 0.65
        occupancy_weight: 0.15
        transition_weight: 0.20
        max_extra_cost: 0.30
        occupancy_decay: 0.92
        transition_decay: 0.98
        warmup_frames: 5

    # Complete OCSort tracker block.
    # type: "ocsort"
    # ocsort:
    #   det_thresh: 0.50
    #   low_det_thresh: 0.10
    #   iou_threshold: 0.30
    #   low_iou_threshold: 0.20
    #   inertia: 0.20
    #   delta_t: 3
    #   min_hits: 3
    #   max_age: 30
    #   min_box_area: 10.0
    #   use_byte: true

  face_detector:
    enabled: false
    type: "scrfd"
    model_instances: 2
    scrfd:
      variant: "500m"
      param_path: "models/detector/scrfd_500m/scrfd_500m.ncnn.param"
      bin_path: "models/detector/scrfd_500m/scrfd_500m.ncnn.bin"
      input_w: 640
      input_h: 640
      score_threshold: 0.45
      nms_threshold: 0.30
      top_k: 100
      ncnn_threads: 1

    # YuNet face detector alternative.
    # enabled: true
    # type: "yunet"
    # model_instances: 1
    # yunet:
    #   param_path: "models/detector/yunet/face_detection_yunet_2023mar.ncnn.param"
    #   bin_path: "models/detector/yunet/face_detection_yunet_2023mar.ncnn.bin"
    #   input_w: 320
    #   input_h: 320
    #   score_threshold: 0.60
    #   nms_threshold: 0.30
    #   top_k: 750
    #   ncnn_threads: 1

    # Disable face probes.
    # enabled: false
    # type: "none"

  face_policy:
    mode: "hybrid"
    full_frame_interval: 30
    full_frame_input_w: 640
    full_frame_input_h: 640
    roi_input_w: 320
    roi_input_h: 320
    max_roi_probes_per_frame: 2
    refresh_interval: 15
    reuse_ttl: 45
    miss_retry_initial: 5
    miss_retry_max: 30
    roi_top_pad_ratio: 0.05
    roi_height_ratio: 0.55
    roi_width_expand_ratio: 0.15
    min_track_height: 48
    min_face_score: 0.45
    max_faces_per_track: 1

  recognizer:
    type: "noop"
    model_instances: 1
    gallery_path: ""
    unknown_threshold: 0.0

  identity:
    type: "noop"
    model_instances: 1
    gallery_path: ""
    unknown_threshold: 0.0
    # Future gallery and embedding-backed identity deciders can use gallery_path
    # and unknown_threshold. The current noop decider marks identities unknown,
    # so tracks remain anonymized unless a future identity module allows them.

metrics:
  enabled: true
  enable_http: true
  enable_ui_payload: true
  log_interval_ms: 5000

streams:
  # stream.output is deprecated and must not be used. Use outputs.profiles.
  - id: "file0"
    type: "file"
    file:
      path: "../../../assets/output.mp4"
      fps: 10
      loop: true
    outputs:
      fps: 5
      profiles:
        inference:
          width: 1088
          height: 608
          keep_aspect: true
          interp: "linear"
          format: "BGR"
        ui:
          width: 1280
          height: 720
          keep_aspect: true
          interp: "linear"
          jpeg_quality: 75
    replicate:
      count: 2
      # ids:
      #   - "file0_a"
      #   - "file0_b"

  # Webcam stream alternative.
  # - id: "cam0"
