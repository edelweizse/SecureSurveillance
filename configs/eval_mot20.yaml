# Minimal evaluation config for MOT20 tracker benchmarking.
# Only modules.person_detector and modules.tracker matter;
# other sections are required to satisfy validate_config().

server:
  host: "0.0.0.0"
  port: 8080

controller:
  host: "0.0.0.0"
  port: 8000

runner:
  id: "eval"
  grpc:
    listen: "unix:///tmp/veilsight-eval.sock"
    fallback_tcp: "127.0.0.1:9091"
  public_base_url: "http://localhost:8080"

streaming:
  primary: "webrtc"
  fallback: "mjpeg"
  codec: "h264"
  encoder: "auto"
  bitrate_kbps: 6000
  keyframe_interval_frames: 30
  webrtc:
    enabled: true
    max_peers_per_stream: 2
    ice_gathering_timeout_ms: 2000
    session_idle_timeout_s: 30
    stun_servers:
      - "stun:stun.l.google.com:19302"
    cors_allowed_origins:
      - "http://localhost:8000"

runtime:
  reorder_window: 5
  pending_state_limit: 500
  jpeg_quality: 75
  queues:
    global:
      person_detector_in_capacity: 50
      face_detector_in_capacity: 50
      recognizer_in_capacity: 50
      identity_in_capacity: 50
      anonymizer_in_capacity: 50
    per_stream:
      frames_in_capacity: 5
      person_detections_in_capacity: 20
      faces_in_capacity: 20
      recognitions_in_capacity: 20
      identities_in_capacity: 20
      encoder_in_capacity: 5
  anonymizer:
    model_instances: 1
    method: "pixelate"
    pixelation_divisor: 10
    blur_kernel: 31

modules:
  person_detector:
    type: "yolox"
    model_instances: 1
    yolox:
      variant: "nano"
      input_w: 1088
      input_h: 608
      score_threshold: 0.01
      nms_threshold: 0.70
      top_k: 1000
      class_id: 0
      ncnn_threads: 4
      letterbox: true
      decoded_output: false

  tracker:
    type: "bytetrack"
    bytetrack:
      high_thresh: 0.25
      low_thresh: 0.05
      new_track_thresh: 0.25
      match_iou_thresh: 0.30
      low_match_iou_thresh: 0.50
      unconfirmed_match_iou_thresh: 0.30
      duplicate_iou_thresh: 0.85
      track_buffer: 30
      min_box_area: 0.0
      fuse_score: false
      scene_grid:
        enabled: true
        rows: 36
        cols: 64
        association_weight: 0.15
        cell_distance_weight: 0.65
        occupancy_weight: 0.15
        transition_weight: 0.20
        max_extra_cost: 0.30
        occupancy_decay: 0.92
        transition_decay: 0.98
        warmup_frames: 5

  face_detector:
    enabled: false
    type: "none"
    model_instances: 1

  recognizer:
    type: "noop"
    model_instances: 1

  identity:
    type: "noop"
    model_instances: 1

metrics:
  enabled: false
  enable_http: false
  enable_ui_payload: false
  log_interval_ms: 5000

streams:
  - id: "dummy"
    type: "webcam"
    webcam:
      device: "/dev/video0"
      width: 640
      height: 480
      fps: 30
      mjpg: true
    outputs:
      fps: 5
      profiles:
        inference:
          width: 640
          height: 480
          keep_aspect: true
          interp: "linear"
          format: "BGR"
