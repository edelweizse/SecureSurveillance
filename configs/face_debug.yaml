server:
  host: "0.0.0.0"
  port: 8080

controller:
  host: "0.0.0.0"
  port: 8000

runner:
  id: "edge-0"
  grpc:
    listen: "unix:///tmp/veilsight-runner.sock"
    fallback_tcp: "127.0.0.1:9090"
  public_base_url: "http://localhost:8080"

streaming:
  primary: "webrtc"
  fallback: "mjpeg"
  codec: "h264"
  encoder: "auto"
  bitrate_kbps: 6000
  keyframe_interval_frames: 30

modules:
  person_detector:
    type: "yolox"
    model_instances: 2
    yolox:
      variant: "nano"
      param_path: "models/detector/bytetrack_nano.ncnn.param"
      bin_path: "models/detector/bytetrack_nano.ncnn.bin"
      input_w: 1088
      input_h: 608
      score_threshold: 0.35
      nms_threshold: 0.45
      top_k: 300
      class_id: 0
      ncnn_threads: 1
      letterbox: true
      decoded_output: false

  tracker:
    type: "bytetrack"
    bytetrack:
      high_thresh: 0.45
      low_thresh: 0.2
      new_track_thresh: 0.45
      match_iou_thresh: 0.35
      low_match_iou_thresh: 0.25
      unconfirmed_match_iou_thresh: 0.35
      duplicate_iou_thresh: 0.85
      track_buffer: 100
      min_box_area: 0.0
      fuse_score: true
      scene_grid:
        enabled: true

  face_detector:
    enabled: true
    type: "scrfd"
    model_instances: 2
    scrfd:
      variant: "500m_landmarks"
      score_threshold: 0.45
      nms_threshold: 0.30
      top_k: 100
      ncnn_threads: 1

  face_policy:
    mode: "hybrid"
    full_frame_interval: 30
    max_roi_probes_per_frame: 2
    refresh_interval: 15
    reuse_ttl: 45

  recognizer:
    type: "noop"
    model_instances: 0

streams:
  - id: "file0"
    type: "file"
    file:
      path: "../../../assets/output.mp4"
      fps: 10
    outputs:
      fps: 10
      profiles:
        inference:
          width: 1088
          height: 608
          keep_aspect: true
          interp: "linear"
          format: "BGR"
        ui:
          width: 1280
          height: 720
          keep_aspect: true
          interp: "linear"
          jpeg_quality: 75
